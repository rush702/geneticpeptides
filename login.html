<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — PepAssure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0b1a35;
      --navy2: #122040;
      --blue: #1a56db;
      --blue2: #3b82f6;
      --teal: #00d4b8;
      --teal2: #06b6d4;
      --green: #10b981;
      --green2: #34d399;
      --amber: #f59e0b;
      --red: #ef4444;
      --gray1: #f8fafc;
      --gray2: #e2e8f0;
      --gray3: #94a3b8;
      --gray4: #64748b;
      --white: #fff;
      --text: #0f172a;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --r: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      min-height: 100vh;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 26, 53, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1rem 2rem;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 1.25rem;
      color: var(--white);
      text-decoration: none;
    }

    .logo-mark {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--green) 100%);
    }

    .logo span {
      color: var(--green);
    }

    nav {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav a {
      color: var(--gray3);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s;
      position: relative;
    }

    nav a:hover {
      color: var(--white);
    }

    nav a.active {
      color: var(--white);
    }

    nav a.active::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--teal), var(--green));
      border-radius: 1px;
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      background: var(--white);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding: 3rem;
      width: 100%;
      max-width: 420px;
    }

    .login-card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .login-card p {
      font-size: 0.95rem;
      color: var(--gray4);
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    input[type="email"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--gray2);
      border-radius: var(--r);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="email"]:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .btn {
      width: 100%;
      padding: 0.875rem;
      border: none;
      border-radius: var(--r);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--green), var(--teal));
      color: var(--white);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      padding: 1rem;
      border-radius: var(--r);
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      display: none;
    }

    .message.success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, 0.2);
      display: block;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.2);
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 2rem;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--gray2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--blue);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--blue2);
      text-decoration: underline;
    }

    /* Footer */
    footer {
      background: rgba(11, 26, 53, 0.5);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 2rem;
      text-align: center;
      color: var(--gray3);
      font-size: 0.875rem;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a href="/" class="logo">
        <div class="logo-mark"></div>
        Pep<span>Assure</span>
      </a>
      <nav>
        <a href="/">Rankings</a>
        <a href="/for-vendors">For Vendors</a>
        <a href="/login" class="active">Login</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="login-card">
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Signing you in...</p>
      </div>

      <div id="content">
        <h1>Sign in to PepAssure</h1>
        <p>Enter your email to receive a magic link</p>

        <div id="message" class="message"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
              disabled
            />
          </div>
          <button type="submit" class="btn btn-primary" id="submitBtn" disabled>
            Send Magic Link
          </button>
        </form>

        <a href="/" class="back-link">← Back to homepage</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 PepAssure. Independent peptide vendor verification.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = '%%SUPABASE_URL%%';
    const SUPABASE_ANON_KEY = '%%SUPABASE_ANON_KEY%%';

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const loginForm = document.getElementById('loginForm');
    const messageDiv = document.getElementById('message');
    const loadingDiv = document.getElementById('loading');
    const contentDiv = document.getElementById('content');

    // Enable form controls once DOM is ready
    setTimeout(() => {
      emailInput.disabled = false;
      submitBtn.disabled = false;
    }, 100);

    // Handle page load — check for auth callback
    window.addEventListener('load', async () => {
      // Check if this is a callback from Supabase auth
      const hash = window.location.hash;
      const params = new URLSearchParams(window.location.search);

      if (hash.includes('access_token') || params.has('code')) {
        showLoading();
        try {
          // Get the session from the callback
          const { data: { session }, error } = await client.auth.getSession();

          if (error || !session) {
            showError('Authentication failed. Please try again.');
            hideLoading();
            return;
          }

          // User is authenticated — check role
          const user = session.user;
          const { data: roleData, error: roleError } = await client
            .from('user_roles')
            .select('role')
            .eq('user_id', user.id)
            .single();

          const role = roleData?.role || null;

          // Redirect based on role
          if (role === 'admin') {
            window.location.href = '/admin';
          } else {
            window.location.href = '/dashboard';
          }
        } catch (err) {
          console.error('Auth callback error:', err);
          showError('An error occurred. Please try again.');
          hideLoading();
        }
      }
    });

    // Handle form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();

      if (!email) {
        showError('Please enter your email address.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      messageDiv.classList.remove('success', 'error');

      try {
        const { error } = await client.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: window.location.origin + '/login',
          },
        });

        if (error) {
          throw error;
        }

        // Success — show confirmation
        showSuccess(`Magic link sent to ${email}`);
        loginForm.style.display = 'none';
      } catch (err) {
        console.error('Sign-in error:', err);
        showError(err.message || 'Failed to send magic link. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Magic Link';
      }
    });

    function showError(message) {
      messageDiv.textContent = message;
      messageDiv.classList.remove('success');
      messageDiv.classList.add('error');
    }

    function showSuccess(message) {
      messageDiv.textContent = '✓ ' + message;
      messageDiv.classList.remove('error');
      messageDiv.classList.add('success');
    }

    function showLoading() {
      contentDiv.style.display = 'none';
      loadingDiv.classList.add('show');
    }

    function hideLoading() {
      loadingDiv.classList.remove('show');
      contentDiv.style.display = 'block';
    }
  </script>
</body>
</html>
