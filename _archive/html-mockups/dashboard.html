<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | PepAssure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0b1a35;
            --navy2: #122040;
            --blue: #1a56db;
            --blue2: #3b82f6;
            --teal: #00d4b8;
            --teal2: #06b6d4;
            --green: #10b981;
            --green2: #34d399;
            --amber: #f59e0b;
            --red: #ef4444;
            --gray1: #f8fafc;
            --gray2: #e2e8f0;
            --gray3: #94a3b8;
            --gray4: #64748b;
            --white: #fff;
            --text: #0f172a;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            --r: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray1);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            background: var(--navy);
            border-bottom: 1px solid rgba(16, 185, 129, 0.15);
            padding: 1rem 2rem;
            z-index: 50;
            box-shadow: var(--shadow);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
        }

        .logo-green {
            color: var(--green);
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--gray2);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
            position: relative;
        }

        nav a:hover {
            color: var(--green);
        }

        nav a.active {
            color: var(--green);
        }

        nav a.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--green);
            border-radius: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .user-email {
            color: var(--gray2);
            font-size: 0.9rem;
        }

        .btn-signout {
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
            border: 1px solid var(--green);
            border-radius: var(--r);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-signout:hover {
            background: var(--green);
            color: var(--white);
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--gray2);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .welcome {
            margin-bottom: 2rem;
        }

        .welcome h1 {
            font-size: 2rem;
            color: var(--navy);
            margin-bottom: 0.5rem;
        }

        .welcome p {
            color: var(--gray4);
            font-size: 1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--white);
            border-radius: var(--r);
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray2);
        }

        .card h2 {
            font-size: 1.25rem;
            color: var(--navy);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            display: inline-block;
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--amber);
        }

        .badge-verified {
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
        }

        .badge-rejected {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
        }

        .claim-table {
            width: 100%;
            border-collapse: collapse;
        }

        .claim-table th {
            text-align: left;
            padding: 1rem;
            border-bottom: 2px solid var(--gray2);
            font-weight: 600;
            color: var(--navy);
            font-size: 0.9rem;
        }

        .claim-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--gray2);
            font-size: 0.95rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--gray4);
        }

        .empty-state p {
            margin-bottom: 1rem;
        }

        .btn-primary {
            padding: 0.75rem 1.5rem;
            background: var(--green);
            color: var(--white);
            border: none;
            border-radius: var(--r);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--green2);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--navy);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray2);
            border-radius: var(--r);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .message {
            padding: 1rem;
            border-radius: var(--r);
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .message-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
            border: 1px solid var(--green);
        }

        .message-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border: 1px solid var(--red);
        }

        footer {
            background: var(--navy);
            color: var(--gray2);
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-inner">
            <div class="logo">Pep<span class="logo-green">Assure</span></div>
            <nav>
                <a href="/">Rankings</a>
                <a href="/for-vendors">For Vendors</a>
                <a href="/dashboard" class="active">Dashboard</a>
            </nav>
            <div class="header-right">
                <span class="user-email" id="userEmail">Loading...</span>
                <button class="btn-signout" onclick="signOut()">Sign Out</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div id="authLoading" class="loading">
            <div class="spinner"></div>
            <p>Verifying your session...</p>
        </div>

        <div id="dashboardContent" style="display: none;">
            <!-- Welcome Section -->
            <div class="welcome">
                <h1 id="welcomeMsg">Welcome back</h1>
                <p>Manage your vendor listing and track your verification status.</p>
            </div>

            <!-- Your Claims -->
            <div class="dashboard-grid">
                <div class="card">
                    <h2>Your Claims</h2>
                    <div id="claimsContainer">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>

                <!-- Submit New Claim -->
                <div class="card" id="newClaimCard" style="display: none;">
                    <h2>Submit New Claim</h2>
                    <div id="formMessage"></div>
                    <form id="claimForm" onsubmit="submitNewClaim(event)">
                        <div class="form-group">
                            <label for="vendorName">Vendor Name *</label>
                            <input type="text" id="vendorName" required>
                        </div>
                        <div class="form-group">
                            <label for="websiteUrl">Website URL</label>
                            <input type="url" id="websiteUrl">
                        </div>
                        <div class="form-group">
                            <label for="claimMessage">Message</label>
                            <textarea id="claimMessage" rows="4"></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Submit Claim</button>
                    </form>
                </div>
            </div>

            <!-- Your Claim Requests -->
            <div class="card">
                <h2>Your Claim Requests</h2>
                <div id="requestsContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        © 2025 PepAssure. Independent peptide vendor verification.
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <script>
        // Initialize Supabase
        const SUPABASE_URL = '%%SUPABASE_URL%%';
        const SUPABASE_ANON_KEY = '%%SUPABASE_ANON_KEY%%';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        // Auth Check
        async function checkAuth() {
            const { data: { session }, error } = await db.auth.getSession();
            if (error || !session) {
                window.location.href = '/login';
                return;
            }
            currentUser = session.user;
            document.getElementById('authLoading').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
            document.getElementById('userEmail').textContent = currentUser.email;
            document.getElementById('welcomeMsg').textContent = `Welcome back, ${currentUser.email}`;
            loadClaims();
            loadClaimRequests();
        }

        // Load Claims
        async function loadClaims() {
            const { data: claims, error } = await db
                .from('vendor_claims')
                .select('*')
                .eq('user_id', currentUser.id);

            const container = document.getElementById('claimsContainer');
            if (error) {
                container.innerHTML = '<p class="empty-state">Error loading claims. Please refresh.</p>';
                return;
            }

            if (!claims || claims.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No claims yet.</p><a href="/for-vendors" class="btn-primary">Submit a Claim</a></div>';
                document.getElementById('newClaimCard').style.display = 'block';
                return;
            }

            let html = '<table class="claim-table"><thead><tr><th>Vendor Name</th><th>Website</th><th>Status</th><th>Created</th></tr></thead><tbody>';
            claims.forEach(claim => {
                const status = claim.status || 'pending';
                const badgeClass = `badge-${status}`;
                const date = new Date(claim.created_at).toLocaleDateString();
                html += `<tr>
                    <td>${claim.vendor_name || 'N/A'}</td>
                    <td><a href="${claim.website_url}" target="_blank" style="color: var(--blue); text-decoration: none;">${claim.website_url || 'N/A'}</a></td>
                    <td><span class="badge ${badgeClass}">${status}</span></td>
                    <td>${date}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Load Claim Requests
        async function loadClaimRequests() {
            const { data: requests, error } = await db
                .from('claim_requests')
                .select('*')
                .eq('contact_email', currentUser.email)
                .order('created_at', { ascending: false });

            const container = document.getElementById('requestsContainer');
            if (error) {
                container.innerHTML = '<p class="empty-state">Your claim requests will appear here once submitted.</p>';
                return;
            }

            if (!requests || requests.length === 0) {
                container.innerHTML = '<p class="empty-state">No claim requests yet. Submit one on the <a href="/for-vendors">For Vendors</a> page.</p>';
                return;
            }

            let html = '<table class="claim-table"><thead><tr><th>Vendor Name</th><th>Status</th><th>Submitted</th></tr></thead><tbody>';
            requests.forEach(req => {
                const status = req.status || 'pending';
                const badgeClass = `badge-${status}`;
                const date = new Date(req.created_at).toLocaleDateString();
                html += `<tr>
                    <td>${req.vendor_name || 'N/A'}</td>
                    <td><span class="badge ${badgeClass}">${status}</span></td>
                    <td>${date}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Submit New Claim
        async function submitNewClaim(event) {
            event.preventDefault();
            const vendorName = document.getElementById('vendorName').value;
            const websiteUrl = document.getElementById('websiteUrl').value;
            const message = document.getElementById('claimMessage').value;
            const msgDiv = document.getElementById('formMessage');

            const btn = event.target.querySelector('button');
            btn.disabled = true;

            const { data, error } = await db.from('vendor_claims').insert({
                user_id: currentUser.id,
                vendor_name: vendorName,
                website_url: websiteUrl,
                contact_email: currentUser.email,
                message: message,
                status: 'pending'
            });

            if (error) {
                msgDiv.innerHTML = `<div class="message message-error">Error: ${error.message}</div>`;
                btn.disabled = false;
            } else {
                msgDiv.innerHTML = '<div class="message message-success">Claim submitted successfully!</div>';
                document.getElementById('claimForm').reset();
                setTimeout(() => {
                    document.getElementById('newClaimCard').style.display = 'none';
                    loadClaims();
                }, 1500);
            }
        }

        // Sign Out
        async function signOut() {
            await db.auth.signOut();
            window.location.href = '/';
        }

        // Initialize
        checkAuth();
    </script>
</body>
</html>
